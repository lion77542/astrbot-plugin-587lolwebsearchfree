name: astrbot_plugin_587lolwebsearchfree
version: 3.3.1
description: 联网搜索插件 - 必应中文增强版（多引擎交叉验证、中文内容保证、UA轮换、极致性能）
author: lin
homepage: https://github.com/lion77542/astrbot-plugin-587lolwebsearchfree
icon: https://raw.githubusercontent.com/lion77542/astrbot-plugin-587lolwebsearchfree/main/icon.png

config:
  # 搜索 API 地址
  search_api: "http://chat.587.lol:11191"
  # 缓存大小（条目数）
  cache_size: 20
  # 缓存生存时间（秒）
  cache_ttl: 300
  # 请求超时时间（秒）
  timeout: 12
  # 失败重试次数
  max_retries: 2
  # 是否启用智能搜索优化
  enable_query_optimization: true
  # 是否启用搜索建议系统
  enable_search_tips: true